<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troubleshoot - Arcade Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;600&display=swap');
        body { background: #0f0c29; color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;}
        .card { background: rgba(255,255,255,0.05); padding: 2rem; border-radius: 15px; border: 1px solid #00f3ff; width: 100%; max-width: 450px; text-align: center; backdrop-filter: blur(10px); }
        h1 { font-family: 'Teko'; font-size: 2.8rem; color: #00f3ff; margin: 0 0 10px 0; letter-spacing: 2px; }
        .user-box { background: #000; padding: 12px; border-radius: 8px; color: #ff3366; font-family: monospace; font-size: 1.2rem; margin: 15px 0; border: 1px solid #333; }
        .section-title { text-align: left; font-family: 'Teko'; color: #00f3ff; font-size: 1.5rem; margin-top: 20px; border-bottom: 1px solid #333; }
        .error-item { text-align: left; background: rgba(255,51,102,0.1); padding: 12px; border-radius: 8px; margin: 10px 0; border-left: 4px solid #ff3366; font-size: 0.95rem; }
        .suggestion-box { background: rgba(0,243,255,0.1); padding: 15px; border-radius: 10px; border: 1px dashed #00f3ff; margin-top: 20px; }
        .suggested-name { color: #00ff88; font-weight: bold; font-size: 1.3rem; font-family: monospace; cursor: pointer; }
        .btn { background: #00f3ff; color: black; border: none; padding: 12px 20px; font-family: 'Teko'; font-size: 1.3rem; cursor: pointer; border-radius: 8px; margin-top: 20px; width: 100%; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: white; box-shadow: 0 0 20px #00f3ff; }
    </style>
</head>
<body>
    <div class="card">
        <h1>LOGIN ANALYSIS</h1>
        <p style="color: #aaa;">Analysis for account attempt:</p>
        <div id="entered-user" class="user-box"></div>
        
        <div id="username-analysis"></div>
        <div id="password-analysis"></div>
        <div id="suggestion-area"></div>

        <button class="btn" onclick="window.history.back()">GO BACK & FIX</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const user = urlParams.get('u') || "";
        const errorMsg = urlParams.get('e') || "";
        document.getElementById('entered-user').innerText = user || "None Provided";

        function analyze() {
            const userArea = document.getElementById('username-analysis');
            const passArea = document.getElementById('password-analysis');
            const suggArea = document.getElementById('suggestion-area');
            
            let userErrors = [];
            let passErrors = [];

            // 1. Reset areas
            userArea.innerHTML = "";
            passArea.innerHTML = "";

            // 2. Username & Blocked Analysis
            if (errorMsg.includes("Letters & Numbers") || errorMsg.includes("short") || errorMsg.includes("BLOCKED") || errorMsg.includes("taken") || errorMsg.includes("not found")) {
                userArea.innerHTML = `<div class="section-title">USERNAME & ACCESS ANALYSIS</div>`;
                
                if (errorMsg.includes("BLOCKED")) {
                    userErrors.push("<b>Account Blocked:</b> Admin has restricted this ID due to suspicious activity or policy violation.");
                    
                }
                if (/\s/.test(user) && !errorMsg.includes("BLOCKED")) userErrors.push("<b>Spaces Detected:</b> Usernames cannot have spaces. Please join the words.");
                if (/[A-Z]/.test(user) && !errorMsg.includes("BLOCKED")) userErrors.push("<b>Capital Letters:</b> Only lowercase letters (a-z) are allowed.");
                if (/[^a-zA-Z0-9]/.test(user) && !errorMsg.includes("BLOCKED")) userErrors.push("<b>Invalid Characters:</b> Symbols like @, #, $ are not permitted.");
                if (user.length > 0 && user.length < 3 && !errorMsg.includes("BLOCKED")) userErrors.push("<b>Length Error:</b> Username must be at least 3 characters.");
                if (errorMsg.includes("taken") && !errorMsg.includes("BLOCKED")) userErrors.push("<b>Name Conflict:</b> This username is already registered by another player.");
                if (errorMsg.includes("not found") && !errorMsg.includes("BLOCKED")) userErrors.push("<b>ID Not Found:</b> This username doesn't exist. Did you forget to 'Create ID'?");

                userErrors.forEach(err => userArea.innerHTML += `<div class='error-item'>${err}</div>`);
                
                // Username issues par suggestion zaroor dikhayein
                if (userErrors.length > 0 && !errorMsg.includes("BLOCKED")) generateSuggestion(user);
            }

            // 3. Password Specific Analysis
            if (errorMsg.includes("Password") || errorMsg.includes("short")) {
                passArea.innerHTML = `<div class="section-title">PASSWORD SECURITY CHECK</div>`;
                if (errorMsg.includes("short")) passErrors.push("<b>Weak Password:</b> Your password must be at least 3 characters long for security.");
                if (errorMsg.includes("Wrong Password")) passErrors.push("<b>Mismatch Error:</b> The password entered does not match our records for this user.");
                
                passErrors.forEach(err => passArea.innerHTML += `<div class='error-item'>${err}</div>`);
            }
            
            // 4. Default if nothing matched
            if (userErrors.length === 0 && passErrors.length === 0) {
                userArea.innerHTML = `<div class='error-item' style='border-left-color:#00f3ff'><b>System Note:</b> Please ensure your internet is stable and you were redirected here form login page.</div>`;
            }
        }

        function generateSuggestion(input) {
            const area = document.getElementById('suggestion-area');
            // Clean logic: lowercase + remove symbols + remove spaces
            let suggestion = input.toLowerCase().replace(/[^a-z0-9]/g, '');
            
            if (suggestion.length < 3) {
                suggestion = "player" + Math.floor(100 + Math.random() * 899);
            } else {
                suggestion = suggestion + Math.floor(10 + Math.random() * 89);
            }

            // Verify final suggestion against rules
            if (/^[a-z0-9]{3,}$/.test(suggestion)) {
                area.innerHTML = `
                    <div class="suggestion-box">
                        <p style="margin:0; color:#00f3ff; font-size:0.9rem;">RE-VALIDATED SUGGESTION:</p>
                        <div class="suggested-name">${suggestion}</div>
                        <p style="margin:5px 0 0 0; font-size:0.75rem; color:#888;">(This name follows all security protocols)</p>
                    </div>`;
            }
        }

        analyze();
    </script>
</body>
</html>
