<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcade Ludo</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #111; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden;
            touch-action: none; user-select: none;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
        }

        #spabk {
            position: fixed; top: 10px; left: 10px; z-index: 99999;
            background: rgba(0,0,0,0.8); color: #00f3ff; border: 1px solid #00f3ff;
            padding: 8px 18px; border-radius: 20px; cursor: pointer;
            font-family: 'Segoe UI', sans-serif; font-size: 0.9rem; backdrop-filter: blur(5px);
            transition: all 0.2s;
        }
        #spabk:hover { background: #00f3ff; color: #000; transform: scale(1.05); }
        #spabk:active { transform: scale(0.95); }

        #mute-btn {
            position: fixed; top: 10px; right: 10px; z-index: 99999;
            background: rgba(0,0,0,0.8); color: #fff; border: 1px solid #fff;
            padding: 8px; border-radius: 50%; cursor: pointer; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; transition: all 0.2s;
        }
        #mute-btn:hover { background: #fff; color: #000; }

        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px;
            border-radius: 20px; border: 2px solid #e74c3c; font-weight: bold;
            z-index: 99999; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #toast.show { opacity: 1; }

        /* MENU SYSTEM */
        .menu-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
            backdrop-filter: blur(5px); transition: opacity 0.3s;
        }
        .hidden { display: none !important; opacity: 0; pointer-events: none; }

        .title {
            font-size: 3.5rem; font-weight: bold; color: #f1c40f; text-shadow: 0 4px 10px rgba(0,0,0,0.8);
            margin-bottom: 2rem; text-align: center; font-family: Impact, sans-serif;
            letter-spacing: 2px;
            animation: pulseTitle 2s infinite alternate;
        }
        @keyframes pulseTitle {
            from { text-shadow: 0 0 10px #f1c40f, 0 0 20px #e67e22; transform: scale(1); }
            to { text-shadow: 0 0 20px #f1c40f, 0 0 40px #e67e22; transform: scale(1.05); }
        }

        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 80%; max-width: 300px; }

        .ludo-btn {
            background: linear-gradient(to bottom, #3498db, #2980b9);
            color: white; border: 2px solid #fff; padding: 15px; font-size: 1.2rem;
            border-radius: 30px; cursor: pointer; font-weight: bold; text-transform: uppercase;
            box-shadow: 0 6px 0 #1c5980; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s;
            position: relative; overflow: hidden;
        }
        .ludo-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 8px 10px rgba(0,0,0,0.5), 0 6px 0 #1c5980;
        }
        .ludo-btn:active { transform: scale(0.95) translateY(6px); box-shadow: 0 0 0 #1c5980; }
        .ludo-btn:hover::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0), rgba(255,255,255,0.4), rgba(255,255,255,0));
            transform: skewX(-20deg); animation: shine 0.5s;
        }
        @keyframes shine { 100% { left: 200%; } }

        .btn-red { background: linear-gradient(to bottom, #e74c3c, #c0392b); box-shadow: 0 6px 0 #7f261d; }
        .btn-green { background: linear-gradient(to bottom, #2ecc71, #27ae60); box-shadow: 0 6px 0 #1a7540; }
        .btn-yellow { background: linear-gradient(to bottom, #f1c40f, #f39c12); box-shadow: 0 6px 0 #a0670c; color: #000; }
        .btn-blue { background: linear-gradient(to bottom, #3498db, #2980b9); box-shadow: 0 6px 0 #1c5980; }

        /* COLOR SELECTOR */
        .color-selector { display: flex; gap: 15px; justify-content: center; margin: 20px 0; }
        .color-box {
            width: 50px; height: 50px; border-radius: 10px; border: 3px solid #fff;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .color-box:hover { transform: scale(1.2) translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.6); }
        .color-box:active { transform: scale(0.9); }
        .color-box.selected { border: 4px solid #fff; box-shadow: 0 0 20px #fff; transform: scale(1.25) translateY(-5px); }

        .cb-red { background: #e74c3c; } .cb-green { background: #2ecc71; }
        .cb-yellow { background: #f1c40f; } .cb-blue { background: #3498db; }

        /* GAME LAYOUT */
        #game-layout {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; display: none;
        }

        #board-container {
            position: relative; width: 95vmin; height: 95vmin; max-width: 600px; max-height: 600px;
            background: #fff; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 8px solid #4a2e15; /* Wood style border */
        }
        canvas { display: block; width: 100%; height: 100%; border-radius: 4px; }

        /* 3D DICE CONTAINER */
        #dice-zone {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 20px;
            border: 2px solid #555;
            transition: all 0.3s;
            position: absolute;
            z-index: 10;
        }

        #turn-indicator {
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px #000;
        }

        #dice-container {
            width: 80px; height: 80px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #dice-zone:hover #dice-container {
            transform: scale(1.1) rotate(5deg);
        }
        #dice-zone:active #dice-container {
            transform: scale(0.9) rotate(-5deg);
        }

        /* PLAYER HUDs */
        .player-hud {
            position: absolute; width: 60px; height: 60px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: white; text-shadow: 1px 1px 2px #000;
            border: 3px solid rgba(255,255,255,0.5); transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); background: rgba(0,0,0,0.6);
        }
        .player-hud.active { border-color: #fff; box-shadow: 0 0 15px #fff; transform: scale(1.1); animation: pulseHud 1s infinite alternate; }
        @keyframes pulseHud { to { box-shadow: 0 0 25px #fff; } }

        #hud-0 { bottom: -70px; left: 0; } /* Red */
        #hud-1 { bottom: -70px; right: 0; } /* Green */
        #hud-2 { top: -70px; right: 0; } /* Yellow */
        #hud-3 { top: -70px; left: 0; } /* Blue */

        /* GAME OVER */
        #game-over-screen { text-align: center; }
        .crown { font-size: 5rem; margin-bottom: 10px; animation: dropCrown 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes dropCrown { 0% { transform: translateY(-100px) scale(0.5); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }

        .fireworks { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 99; }
    </style>
    <!-- Include Three.js for the 3D Dice -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <button id="spabk" onclick="window.parent.postMessage('spa-back','*')">← Hub</button>
    <button id="mute-btn" onclick="toggleMute()">🔊</button>
    <div id="toast"></div>

    <!-- UI Menus -->
    <div id="menu-main" class="menu-screen">
        <div class="title">ARCADE LUDO</div>
        <div class="btn-group">
            <button class="ludo-btn btn-blue" onclick="showMenu('menu-vs-ai')">VS Computer (AI)</button>
            <button class="ludo-btn btn-green" onclick="showMenu('menu-vs-player')">Pass & Play (PvP)</button>
        </div>
        <div id="resume-container" style="display:none; margin-top:30px;">
            <button class="ludo-btn btn-yellow" onclick="resumeGame()">Resume Saved Game</button>
            <button class="ludo-btn btn-red" style="margin-top:10px; font-size:1rem;" onclick="clearSave()">Delete Save</button>
        </div>
    </div>

    <div id="menu-vs-ai" class="menu-screen hidden">
        <div class="title" style="font-size:2.5rem;">VS COMPUTER</div>
        <h3 style="color:white; margin-bottom:10px;">Select Difficulty:</h3>
        <div class="btn-group" style="flex-direction:row; gap:10px; margin-bottom: 20px;">
            <button id="ai-normal" class="ludo-btn btn-blue" style="flex:1;" onclick="setAIDifficulty('normal')">Normal</button>
            <button id="ai-advanced" class="ludo-btn" style="background:#555; box-shadow:0 6px 0 #222; flex:1;" onclick="setAIDifficulty('advanced')">Advanced</button>
        </div>

        <h3 style="color:white; margin-bottom:10px;">Select Your Color:</h3>
        <div class="color-selector">
            <div class="color-box cb-red selected" onclick="selectColor(0)"></div>
            <div class="color-box cb-green" onclick="selectColor(1)"></div>
            <div class="color-box cb-yellow" onclick="selectColor(2)"></div>
            <div class="color-box cb-blue" onclick="selectColor(3)"></div>
        </div>

        <h3 style="color:white; margin-bottom:10px;">Players:</h3>
        <div class="btn-group" style="flex-direction:row; gap:10px; margin-bottom: 20px;">
            <button id="ai-p2" class="ludo-btn btn-green" style="flex:1;" onclick="setPlayerCount(2, 'ai')">2P</button>
            <button id="ai-p3" class="ludo-btn" style="background:#555; box-shadow:0 6px 0 #222; flex:1;" onclick="setPlayerCount(3, 'ai')">3P</button>
            <button id="ai-p4" class="ludo-btn" style="background:#555; box-shadow:0 6px 0 #222; flex:1;" onclick="setPlayerCount(4, 'ai')">4P</button>
        </div>

        <div class="btn-group">
            <button class="ludo-btn btn-yellow" onclick="startGame('ai')">START GAME</button>
            <button class="ludo-btn btn-red" onclick="showMenu('menu-main')">BACK</button>
        </div>
    </div>

    <div id="menu-vs-player" class="menu-screen hidden">
        <div class="title" style="font-size:2.5rem;">PASS & PLAY</div>

        <h3 style="color:white; margin-bottom:10px;">Select Your Color:</h3>
        <div class="color-selector">
            <div class="color-box cb-red selected" onclick="selectColor(0)"></div>
            <div class="color-box cb-green" onclick="selectColor(1)"></div>
            <div class="color-box cb-yellow" onclick="selectColor(2)"></div>
            <div class="color-box cb-blue" onclick="selectColor(3)"></div>
        </div>

        <h3 style="color:white; margin-bottom:10px;">Players:</h3>
        <div class="btn-group" style="flex-direction:row; gap:10px; margin-bottom: 20px;">
            <button id="pvp-p2" class="ludo-btn btn-green" style="flex:1;" onclick="setPlayerCount(2, 'pvp')">2P</button>
            <button id="pvp-p3" class="ludo-btn" style="background:#555; box-shadow:0 6px 0 #222; flex:1;" onclick="setPlayerCount(3, 'pvp')">3P</button>
            <button id="pvp-p4" class="ludo-btn" style="background:#555; box-shadow:0 6px 0 #222; flex:1;" onclick="setPlayerCount(4, 'pvp')">4P</button>
        </div>

        <div class="btn-group">
            <button class="ludo-btn btn-yellow" onclick="startGame('pvp')">START GAME</button>
            <button class="ludo-btn btn-red" onclick="showMenu('menu-main')">BACK</button>
        </div>
    </div>

    <div id="game-over-screen" class="menu-screen hidden">
        <div class="crown" id="go-crown">👑</div>
        <div class="title" id="go-title" style="font-size:3rem; margin-bottom:10px;">PLAYER 1 WINS!</div>
        <div id="go-stats" style="color:white; font-size:1.2rem; margin-bottom:20px;"></div>
        <div class="btn-group">
            <button class="ludo-btn btn-green" onclick="location.reload()">PLAY AGAIN</button>
            <button class="ludo-btn btn-red" onclick="window.parent.postMessage('spa-back','*')">QUIT TO HUB</button>
        </div>
        <canvas class="fireworks" id="fireworks-canvas"></canvas>
    </div>

    <!-- GAME BOARD -->
    <div id="game-layout">
        <div id="board-container">
            <canvas id="ludoBoard"></canvas>

            <!-- HUDs positioned around the board -->
            <div id="hud-0" class="player-hud" style="display:none;">P1</div>
            <div id="hud-1" class="player-hud" style="display:none;">P2</div>
            <div id="hud-2" class="player-hud" style="display:none;">P3</div>
            <div id="hud-3" class="player-hud" style="display:none;">P4</div>

            <!-- Dice Zone -->
            <div id="dice-zone">
                <div id="turn-indicator">Player Turn</div>
                <div id="dice-container" onclick="rollDiceClick()"></div>
            </div>
        </div>
    </div>

    <script>
        // --- UI & SOUNDS (Using short synthesized beeps to avoid external assets) ---
        let isMuted = false;
        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('mute-btn').innerText = isMuted ? '🔇' : '🔊';
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration, vol=0.1) {
            if(isMuted) return;
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }
        const sfx = {
            click: () => playTone(600, 'sine', 0.1),
            move: () => playTone(800, 'square', 0.05),
            cut: () => playTone(200, 'sawtooth', 0.3, 0.2),
            home: () => { playTone(500, 'sine', 0.1); setTimeout(()=>playTone(800, 'sine', 0.2), 100); },
            win: () => { playTone(400, 'sine', 0.2); setTimeout(()=>playTone(600, 'sine', 0.2), 200); setTimeout(()=>playTone(800, 'sine', 0.4), 400); }
        };

        // --- MENU LOGIC ---
        let gameConfig = {
            mode: 'ai', // 'ai' or 'pvp'
            difficulty: 'normal',
            playerColor: 0, // 0:Red, 1:Green, 2:Yellow, 3:Blue
            playerCount: 2
        };

        function showMenu(id) {
            sfx.click();
            document.querySelectorAll('.menu-screen').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function setAIDifficulty(diff) {
            sfx.click();
            gameConfig.difficulty = diff;
            document.getElementById('ai-normal').style.background = diff === 'normal' ? 'linear-gradient(to bottom, #3498db, #2980b9)' : '#555';
            document.getElementById('ai-normal').style.boxShadow = diff === 'normal' ? '0 6px 0 #1c5980' : '0 6px 0 #222';
            document.getElementById('ai-advanced').style.background = diff === 'advanced' ? 'linear-gradient(to bottom, #9b59b6, #8e44ad)' : '#555';
            document.getElementById('ai-advanced').style.boxShadow = diff === 'advanced' ? '0 6px 0 #5c2c6d' : '0 6px 0 #222';
        }

        function selectColor(c) {
            sfx.click();
            gameConfig.playerColor = c;
            // Update all color-box groups to stay in sync (AI and PvP menus)
            document.querySelectorAll('.color-selector').forEach(selector => {
                selector.querySelectorAll('.color-box').forEach((box, index) => {
                     if (index === c) box.classList.add('selected');
                     else box.classList.remove('selected');
                });
            });
        }

        function setPlayerCount(count, mode) {
            sfx.click();
            gameConfig.playerCount = count;
            const prefix = mode === 'ai' ? 'ai-p' : 'pvp-p';
            [2, 3, 4].forEach(n => {
                const el = document.getElementById(`${prefix}${n}`);
                if(n === count) {
                    el.style.background = 'linear-gradient(to bottom, #2ecc71, #27ae60)';
                    el.style.boxShadow = '0 6px 0 #1a7540';
                } else {
                    el.style.background = '#555';
                    el.style.boxShadow = '0 6px 0 #222';
                }
            });
        }

        function checkSavedGame() {
            const saved = localStorage.getItem('arcade_ludo_save');
            if(saved) {
                document.getElementById('resume-container').style.display = 'block';
            }
        }
        checkSavedGame();

        function clearSave() {
            sfx.click();
            localStorage.removeItem('arcade_ludo_save');
            document.getElementById('resume-container').style.display = 'none';
            // Use parent SPA notify if available, fallback to nothing
            try{ window.parent.postMessage({type:'notify',msg:'Save deleted!',nt:'success'},'*'); }catch(e){}
        }

        function resumeGame() {
            sfx.click();
            const saved = localStorage.getItem('arcade_ludo_save');
            if(saved) {
                try {
                    const data = JSON.parse(saved);
                    gameState = data;
                    document.querySelectorAll('.menu-screen').forEach(el => el.classList.add('hidden'));
                    initGameUI();
                } catch(e) {
                    clearSave();
                }
            }
        }

        function startGame(mode) {
            sfx.click();
            gameConfig.mode = mode;
            document.querySelectorAll('.menu-screen').forEach(el => el.classList.add('hidden'));

            // Initialize Game State
            gameState = {
                mode: gameConfig.mode,
                difficulty: gameConfig.difficulty,
                playerCount: gameConfig.playerCount,
                humanColor: gameConfig.mode === 'ai' ? gameConfig.playerColor : -1, // -1 means all are human in pvp
                turn: 0,
                diceValue: 0,
                sixCount: 0,
                state: 'ROLLING', // ROLL, MOVE, ANIMATING
                players: [],
                log: []
            };

            // Setup players based on count
            // Positions: 0=Bottom-Left, 1=Bottom-Right, 2=Top-Right, 3=Top-Left
            // Ludo King order: Red->Green->Yellow->Blue
            const baseColors = ['Red', 'Green', 'Yellow', 'Blue'];
            const baseHexColors = ['#e74c3c', '#2ecc71', '#f1c40f', '#3498db'];

            // Map colors sequentially starting from the user's choice assigned to Player 0
            const mappedColors = [];
            const mappedHexColors = [];
            for (let i = 0; i < 4; i++) {
                const colorIdx = (gameConfig.playerColor + i) % 4;
                mappedColors.push(baseColors[colorIdx]);
                mappedHexColors.push(baseHexColors[colorIdx]);
            }

            for(let i=0; i<4; i++) {
                let isActive = false;

                // Player 0 (Bottom-Left) is ALWAYS the human player/Player 1
                if (i === 0) {
                    isActive = true;
                } else if (gameConfig.playerCount === 2) {
                    // For 2P, pick the opposite position (Player 2 at Top-Right)
                    isActive = (i === 2);
                } else if (gameConfig.playerCount === 3) {
                    // For 3P, pick 0, 1, 2
                    isActive = (i === 0 || i === 1 || i === 2);
                } else {
                    // 4P
                    isActive = true;
                }

                let isAI = false;
                if(gameConfig.mode === 'ai' && isActive && i !== 0) isAI = true;

                gameState.players.push({
                    id: i,
                    name: mappedColors[i],
                    hex: mappedHexColors[i],
                    active: isActive,
                    isAI: isAI,
                    tokens: [
                        {id: 0, pos: -1, isHome: false}, // -1 = base, 0-51 = track, 100-105 = home stretch, 999 = done
                        {id: 1, pos: -1, isHome: false},
                        {id: 2, pos: -1, isHome: false},
                        {id: 3, pos: -1, isHome: false}
                    ],
                    finishedCount: 0
                });
            }

            // Set first turn to Player 0
            gameState.turn = 0;

            initGameUI();
        }

        // --- GAME LOGIC & RENDERING ---
        const canvas = document.getElementById('ludoBoard');
        const ctx = canvas.getContext('2d');
        let boardSize = 0;
        let cellSize = 0;
        let gameState = null;

        const offScreenCanvas = document.createElement('canvas');
        const offScreenCtx = offScreenCanvas.getContext('2d');

        // Path definitions for 0-51 global track
        // Red start: 0, Green start: 13, Yellow start: 26, Blue start: 39
        // Safe zones: 0, 8, 13, 21, 26, 34, 39, 47
        const safeZones = [0, 8, 13, 21, 26, 34, 39, 47];

        function resizeBoard() {
            const container = document.getElementById('board-container');
            const w = container.clientWidth;
            const h = container.clientHeight;
            boardSize = Math.min(w, h);

            // High-DPI support
            const dpr = window.devicePixelRatio || 1;
            canvas.width = boardSize * dpr;
            canvas.height = boardSize * dpr;
            canvas.style.width = boardSize + "px";
            canvas.style.height = boardSize + "px";
            ctx.scale(dpr, dpr);

            offScreenCanvas.width = canvas.width;
            offScreenCanvas.height = canvas.height;
            offScreenCtx.scale(dpr, dpr);

            cellSize = boardSize / 15;
            if(gameState) {
                drawStaticBoard();
                drawBoard();
                positionDice();
            }
        }
        window.addEventListener('resize', resizeBoard);

        function initGameUI() {
            document.getElementById('game-layout').style.display = 'flex';

            // Setup HUDs with SVGs
            for(let i=0; i<4; i++) {
                const hud = document.getElementById(`hud-${i}`);
                if(gameState.players[i].active) {
                    hud.style.display = 'flex';
                    hud.style.backgroundColor = gameState.players[i].hex;

                    if (gameState.players[i].isAI) {
                        hud.innerHTML = `<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>`;
                    } else {
                        hud.innerHTML = `<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>`;
                    }
                } else {
                    hud.style.display = 'none';
                }
            }

            resizeBoard();
            init3DDice();
            updateTurnUI();

            if(gameState.players[gameState.turn].isAI && gameState.state === 'ROLLING') {
                setTimeout(doAITurn, 1000);
            }
        }

        function saveGame() {
            localStorage.setItem('arcade_ludo_save', JSON.stringify(gameState));
        }

        function updateTurnUI() {
            for(let i=0; i<4; i++) {
                const hud = document.getElementById(`hud-${i}`);
                if(i === gameState.turn) hud.classList.add('active');
                else hud.classList.remove('active');
            }
            positionDice();
            drawBoard();
        }

        // --- DRAWING THE BOARD (CTX) ---
        function drawStaticBoard() {
            offScreenCtx.clearRect(0, 0, boardSize, boardSize);

            // Background Wood Texture Color
            offScreenCtx.fillStyle = '#fdfbf7';
            offScreenCtx.fillRect(0, 0, boardSize, boardSize);

            // Draw Bases (6x6 cells each corner)
            drawBase(0, 0, boardSize - cellSize*6, gameState.players[0].hex, 0); // Red - BL
            drawBase(boardSize - cellSize*6, boardSize - cellSize*6, boardSize - cellSize*6, gameState.players[1].hex, 1); // Green - BR
            drawBase(boardSize - cellSize*6, 0, 0, gameState.players[2].hex, 2); // Yellow - TR
            drawBase(0, 0, 0, gameState.players[3].hex, 3); // Blue - TL

            // Draw Home Center
            drawCenterHome();

            // Draw Tracks
            drawTracks();
        }

        function drawBoard() {
            ctx.clearRect(0, 0, boardSize, boardSize);
            ctx.drawImage(offScreenCanvas, 0, 0, offScreenCanvas.width / (window.devicePixelRatio || 1), offScreenCanvas.height / (window.devicePixelRatio || 1));

            // Draw Tokens
            drawAllTokens();
        }

        function drawBase(x, y, by, color, pIdx) {
            // Main box
            let bx = pIdx === 0 || pIdx === 3 ? 0 : boardSize - cellSize*6;
            let currentBy = pIdx === 0 || pIdx === 1 ? boardSize - cellSize*6 : 0;

            offScreenCtx.fillStyle = color;
            offScreenCtx.fillRect(bx, currentBy, cellSize*6, cellSize*6);
            offScreenCtx.strokeStyle = '#000';
            offScreenCtx.lineWidth = 2;
            offScreenCtx.strokeRect(bx, currentBy, cellSize*6, cellSize*6);

            // Inner white box
            offScreenCtx.fillStyle = '#fff';
            offScreenCtx.fillRect(bx + cellSize, currentBy + cellSize, cellSize*4, cellSize*4);
            offScreenCtx.strokeRect(bx + cellSize, currentBy + cellSize, cellSize*4, cellSize*4);

            // Token circles
            const positions = [
                {x: bx + cellSize*2, y: currentBy + cellSize*2},
                {x: bx + cellSize*4, y: currentBy + cellSize*2},
                {x: bx + cellSize*2, y: currentBy + cellSize*4},
                {x: bx + cellSize*4, y: currentBy + cellSize*4}
            ];

            positions.forEach((pos, i) => {
                offScreenCtx.beginPath();
                offScreenCtx.arc(pos.x, pos.y, cellSize*0.6, 0, Math.PI*2);
                offScreenCtx.fillStyle = '#ddd';
                offScreenCtx.fill();
                offScreenCtx.stroke();
            });
        }

        function drawCenterHome() {
            offScreenCtx.beginPath();
            offScreenCtx.moveTo(cellSize*6, cellSize*6);
            offScreenCtx.lineTo(cellSize*7.5, cellSize*7.5);
            offScreenCtx.lineTo(cellSize*6, cellSize*9);
            offScreenCtx.fillStyle = gameState.players[3].hex; // Blue
            offScreenCtx.fill(); offScreenCtx.stroke();

            offScreenCtx.beginPath();
            offScreenCtx.moveTo(cellSize*6, cellSize*9);
            offScreenCtx.lineTo(cellSize*7.5, cellSize*7.5);
            offScreenCtx.lineTo(cellSize*9, cellSize*9);
            offScreenCtx.fillStyle = gameState.players[0].hex; // Red
            offScreenCtx.fill(); offScreenCtx.stroke();

            offScreenCtx.beginPath();
            offScreenCtx.moveTo(cellSize*9, cellSize*9);
            offScreenCtx.lineTo(cellSize*7.5, cellSize*7.5);
            offScreenCtx.lineTo(cellSize*9, cellSize*6);
            offScreenCtx.fillStyle = gameState.players[1].hex; // Green
            offScreenCtx.fill(); offScreenCtx.stroke();

            offScreenCtx.beginPath();
            offScreenCtx.moveTo(cellSize*9, cellSize*6);
            offScreenCtx.lineTo(cellSize*7.5, cellSize*7.5);
            offScreenCtx.lineTo(cellSize*6, cellSize*6);
            offScreenCtx.fillStyle = gameState.players[2].hex; // Yellow
            offScreenCtx.fill(); offScreenCtx.stroke();
        }

        // Coordinate mapping for track 0-51
        // 0 starts at Red start (bottom-mid-left of center)
        function getCellCoords(pos) {
            let cx=0, cy=0;
            if(pos < 5) { cx = 6; cy = 13 - pos; }
            else if(pos < 11) { cx = 5 - (pos-5); cy = 8; }
            else if(pos < 13) { cx = 0; cy = 8 - (pos-10); }
            else if(pos < 18) { cx = pos - 12; cy = 6; }
            else if(pos < 24) { cx = 6; cy = 5 - (pos-18); }
            else if(pos < 26) { cx = 6 + (pos-23); cy = 0; }
            else if(pos < 31) { cx = 8; cy = pos - 25; }
            else if(pos < 37) { cx = 9 + (pos-31); cy = 6; }
            else if(pos < 39) { cx = 14; cy = 6 + (pos-36); }
            else if(pos < 44) { cx = 13 - (pos-39); cy = 8; }
            else if(pos < 50) { cx = 8; cy = 9 + (pos-44); }
            else if(pos < 52) { cx = 8 - (pos-49); cy = 14; }
            return {x: cx, y: cy};
        }

        // Home stretch coords: 100-105. Depends on player
        function getHomeCoords(pIdx, hPos) { // hPos 0-4 (5 is home)
            let cx=0, cy=0;
            if(pIdx === 0) { cx = 7; cy = 13 - hPos; } // Red up
            else if(pIdx === 1) { cx = 13 - hPos; cy = 7; } // Green left
            else if(pIdx === 2) { cx = 7; cy = 1 + hPos; } // Yellow down
            else if(pIdx === 3) { cx = 1 + hPos; cy = 7; } // Blue right
            return {x: cx, y: cy};
        }

        function drawTracks() {
            offScreenCtx.lineWidth = 1;
            offScreenCtx.strokeStyle = '#2c3e50';

            // Draw all 52 global cells
            for(let i=0; i<52; i++) {
                const c = getCellCoords(i);
                offScreenCtx.fillStyle = '#ffffff';

                // Texture overlay for normal cells
                let isStart = [0, 13, 26, 39].includes(i);

                if(safeZones.includes(i)) {
                    if(i===0) offScreenCtx.fillStyle = gameState.players[0].hex; // Red start (Bottom)
                    else if(i===13) offScreenCtx.fillStyle = gameState.players[3].hex; // Blue start (Left)
                    else if(i===26) offScreenCtx.fillStyle = gameState.players[2].hex; // Yellow start (Top)
                    else if(i===39) offScreenCtx.fillStyle = gameState.players[1].hex; // Green start (Right)
                    else offScreenCtx.fillStyle = '#bdc3c7'; // Star safe zone
                }

                offScreenCtx.fillRect(c.x*cellSize, c.y*cellSize, cellSize, cellSize);
                offScreenCtx.strokeRect(c.x*cellSize, c.y*cellSize, cellSize, cellSize);

                // Add arrow for starts
                if (isStart) {
                    drawArrow(c.x, c.y, i);
                }

                // Draw Complex Star for safe zones
                if([0,8,13,21,26,34,39,47].includes(i)) {
                    let starColor = isStart ? '#ffffff' : '#34495e';
                    drawStar(c.x*cellSize + cellSize/2, c.y*cellSize + cellSize/2, 5, cellSize*0.35, cellSize*0.15, starColor);
                }
            }

            // Draw home stretches with gradients
            for(let p=0; p<4; p++) {
                for(let h=0; h<5; h++) {
                    const c = getHomeCoords(p, h);
                    let grad = offScreenCtx.createLinearGradient(c.x*cellSize, c.y*cellSize, c.x*cellSize + cellSize, c.y*cellSize + cellSize);
                    grad.addColorStop(0, shadeColor(gameState.players[p].hex, 20));
                    grad.addColorStop(1, gameState.players[p].hex);
                    offScreenCtx.fillStyle = grad;
                    offScreenCtx.fillRect(c.x*cellSize, c.y*cellSize, cellSize, cellSize);
                    offScreenCtx.strokeRect(c.x*cellSize, c.y*cellSize, cellSize, cellSize);
                }
            }
        }

        function drawArrow(cx, cy, posIndex) {
            let px = cx * cellSize + cellSize/2;
            let py = cy * cellSize + cellSize/2;
            offScreenCtx.save();
            offScreenCtx.translate(px, py);
            if(posIndex === 0) offScreenCtx.rotate(0); // Red (up)
            else if(posIndex === 13) offScreenCtx.rotate(Math.PI/2); // Blue (right)
            else if(posIndex === 26) offScreenCtx.rotate(Math.PI); // Yellow (down)
            else if(posIndex === 39) offScreenCtx.rotate(-Math.PI/2); // Green (left)

            offScreenCtx.beginPath();
            offScreenCtx.moveTo(-cellSize*0.2, cellSize*0.1);
            offScreenCtx.lineTo(0, -cellSize*0.2);
            offScreenCtx.lineTo(cellSize*0.2, cellSize*0.1);
            offScreenCtx.fillStyle = 'rgba(0,0,0,0.2)';
            offScreenCtx.fill();
            offScreenCtx.restore();
        }

        function drawStar(cx, cy, spikes, outerRadius, innerRadius, color) {
            let rot = Math.PI / 2 * 3;
            let x = cx, y = cy, step = Math.PI / spikes;

            offScreenCtx.save();
            // Star shadow
            offScreenCtx.shadowColor = 'rgba(0,0,0,0.3)';
            offScreenCtx.shadowBlur = 4;
            offScreenCtx.shadowOffsetY = 2;

            offScreenCtx.beginPath();
            offScreenCtx.moveTo(cx, cy - outerRadius)
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                offScreenCtx.lineTo(x, y)
                rot += step
                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                offScreenCtx.lineTo(x, y)
                rot += step
            }
            offScreenCtx.lineTo(cx, cy - outerRadius)
            offScreenCtx.closePath();
            offScreenCtx.fillStyle = color;
            offScreenCtx.fill();
            offScreenCtx.strokeStyle = 'rgba(255,255,255,0.4)';
            offScreenCtx.lineWidth = 1;
            offScreenCtx.stroke();
            offScreenCtx.restore();
        }

        function drawToken(x, y, color, shadowScale = 1, scale = 1) {
            let r = cellSize*0.4 * scale;

            // Shadow
            ctx.beginPath();
            ctx.arc(x + 2*scale, y + 4*scale + (1-shadowScale)*10, r, 0, Math.PI*2);
            ctx.fillStyle = `rgba(0,0,0,${0.5 * shadowScale})`;
            ctx.fill();

            // Create Radial Gradient for Glossy Dome look
            let gradient = ctx.createRadialGradient(x - r*0.3, y - r*0.3, r*0.1, x, y, r);
            gradient.addColorStop(0, '#ffffff'); // highlight
            gradient.addColorStop(0.3, color);
            gradient.addColorStop(1, shadeColor(color, -30)); // edge shading

            // Base
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI*2);
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.lineWidth = 2 * scale;
            ctx.strokeStyle = '#fff';
            ctx.stroke();

            // Inner ring
            ctx.beginPath();
            ctx.arc(x, y, r*0.5, 0, Math.PI*2);
            ctx.strokeStyle = 'rgba(255,255,255,0.6)';
            ctx.stroke();
        }

        // Utility for darkening color
        function shadeColor(color, percent) {
            let R = parseInt(color.substring(1,3),16);
            let G = parseInt(color.substring(3,5),16);
            let B = parseInt(color.substring(5,7),16);

            R = parseInt(R * (100 + percent) / 100);
            G = parseInt(G * (100 + percent) / 100);
            B = parseInt(B * (100 + percent) / 100);

            R = (R<255)?R:255;
            G = (G<255)?G:255;
            B = (B<255)?B:255;

            let RR = ((R.toString(16).length==1)?"0"+R.toString(16):R.toString(16));
            let GG = ((G.toString(16).length==1)?"0"+G.toString(16):G.toString(16));
            let BB = ((B.toString(16).length==1)?"0"+B.toString(16):B.toString(16));

            return "#"+RR+GG+BB;
        }

        function drawAllTokens() {
            // Group tokens by position to handle overlaps
            const posMap = {};
            let animatingData = null;

            gameState.players.forEach((p, pIdx) => {
                if(!p.active) return;

                // Draw base tokens
                let bx = pIdx === 0 || pIdx === 3 ? 0 : boardSize - cellSize*6;
                let currentBy = pIdx === 0 || pIdx === 1 ? boardSize - cellSize*6 : 0;
                const positions = [
                    {x: bx + cellSize*2, y: currentBy + cellSize*2},
                    {x: bx + cellSize*4, y: currentBy + cellSize*2},
                    {x: bx + cellSize*2, y: currentBy + cellSize*4},
                    {x: bx + cellSize*4, y: currentBy + cellSize*4}
                ];

                p.tokens.forEach((t, i) => {
                    if (t === animatingToken && t.animX != null && t.animY != null) {
                        animatingData = { t: t, color: p.hex };
                        return; // Skip normal drawing
                    }

                    if (t.pos === -1) {
                        drawToken(positions[i].x, positions[i].y, p.hex);
                    } else if(t.pos >= 0 && t.pos < 100) {
                        if(!posMap[t.pos]) posMap[t.pos] = [];
                        posMap[t.pos].push({pIdx, color: p.hex});
                    } else if (t.pos >= 100 && t.pos < 105) {
                        const hKey = `h_${pIdx}_${t.pos}`;
                        if(!posMap[hKey]) posMap[hKey] = [];
                        posMap[hKey].push({pIdx, color: p.hex});
                    } else if (t.pos === 999) {
                        const dKey = `d_${pIdx}_${t.pos}`;
                        if(!posMap[dKey]) posMap[dKey] = [];
                        posMap[dKey].push({pIdx, color: p.hex});
                    }
                });
            });

            // Draw them
            for(let key in posMap) {
                const toks = posMap[key];
                let coords;
                if(key.startsWith('h_')) {
                    const parts = key.split('_');
                    coords = getHomeCoords(parseInt(parts[1]), parseInt(parts[2]) - 100);
                } else if(key.startsWith('d_')) {
                    continue; // skip drawing home elements here, we draw them below
                } else {
                    coords = getCellCoords(parseInt(key));
                }

                if(!coords) continue; // skip if invalid coords

                const cx = coords.x * cellSize + cellSize/2;
                const cy = coords.y * cellSize + cellSize/2;

                if(toks.length === 1) {
                    drawToken(cx, cy, toks[0].color);
                } else {
                    // Overlap drawing: draw one token and write number on it
                    // Find majority color or just use first one
                    const mainColor = toks[0].color;
                    drawToken(cx, cy, mainColor);

                    ctx.fillStyle = '#fff';
                    ctx.font = `bold ${cellSize*0.4}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('x' + toks.length, cx, cy);
                }
            }

            // Draw center home tokens (pos 999)
            // Center of the board is at 7.5 * cellSize, 7.5 * cellSize
            // Each player's home section is a triangle
            const cx = 7.5 * cellSize;
            const cy = 7.5 * cellSize;
            for(let key in posMap) {
                if(!key.startsWith('d_')) continue;
                const toks = posMap[key];
                const parts = key.split('_');
                const pIdx = parseInt(parts[1]);

                // Determine placement angle/position based on player index
                // 0: Red (bottom triangle), 1: Green (right triangle), 2: Yellow (top triangle), 3: Blue (left triangle)
                let offsetX = 0;
                let offsetY = 0;

                toks.forEach((t, i) => {
                    if (pIdx === 0) { // Red - Bottom
                        offsetX = (i - (toks.length - 1)/2) * (cellSize*0.3);
                        offsetY = cellSize*1.0;
                    } else if (pIdx === 1) { // Green - Right
                        offsetX = cellSize*1.0;
                        offsetY = (i - (toks.length - 1)/2) * (cellSize*0.3);
                    } else if (pIdx === 2) { // Yellow - Top
                        offsetX = (i - (toks.length - 1)/2) * (cellSize*0.3);
                        offsetY = -cellSize*1.0;
                    } else if (pIdx === 3) { // Blue - Left
                        offsetX = -cellSize*1.0;
                        offsetY = (i - (toks.length - 1)/2) * (cellSize*0.3);
                    }

                    drawToken(cx + offsetX, cy + offsetY, t.color, 1, 0.6); // draw smaller tokens
                });
            }

            if (animatingData) {
                drawToken(animatingData.t.animX, animatingData.t.animY, animatingData.color, animatingData.t.shadowScale, 1.2);
            }
        }

        // --- 3D DICE LOGIC (THREE.JS) ---
        let dScene, dCamera, dRenderer, diceMesh;
        let isRolling = false;

        function init3DDice() {
            const diceZone = document.getElementById('dice-zone');
            diceZone.style.display = 'flex';

            const container = document.getElementById('dice-container');
            if(dScene) return; // already init

            dScene = new THREE.Scene();
            dCamera = new THREE.PerspectiveCamera(40, 1, 0.1, 100);
            dCamera.position.z = 5;

            dRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            dRenderer.setSize(80, 80);
            container.appendChild(dRenderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            dScene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(2, 5, 2);
            dScene.add(dirLight);

            // Simple box for dice, color based on current turn
            const geo = new THREE.BoxGeometry(2, 2, 2);
            // Create canvas textures for numbers 1-6
            const materials = [];
            for(let i=1; i<=6; i++) {
                const c = document.createElement('canvas'); c.width=64; c.height=64;
                const cctx = c.getContext('2d');
                cctx.fillStyle = '#fff'; cctx.fillRect(0,0,64,64);
                cctx.fillStyle = '#000'; cctx.beginPath();
                // Draw dots
                const r = 6;
                if([1,3,5].includes(i)) { cctx.arc(32,32,r,0,Math.PI*2); cctx.fill(); }
                if([2,3,4,5,6].includes(i)) { cctx.beginPath(); cctx.arc(16,16,r,0,Math.PI*2); cctx.fill(); cctx.beginPath(); cctx.arc(48,48,r,0,Math.PI*2); cctx.fill(); }
                if([4,5,6].includes(i)) { cctx.beginPath(); cctx.arc(16,48,r,0,Math.PI*2); cctx.fill(); cctx.beginPath(); cctx.arc(48,16,r,0,Math.PI*2); cctx.fill(); }
                if(i===6) { cctx.beginPath(); cctx.arc(16,32,r,0,Math.PI*2); cctx.fill(); cctx.beginPath(); cctx.arc(48,32,r,0,Math.PI*2); cctx.fill(); }

                const tex = new THREE.CanvasTexture(c);
                materials.push(new THREE.MeshStandardMaterial({ map: tex, roughness: 0.2 }));
            }
            // Order to map standard dice faces: +x, -x, +y, -y, +z, -z
            diceMesh = new THREE.Mesh(geo, materials);
            dScene.add(diceMesh);

            setDiceFace(6); // Default

            function dAnimate() {
                requestAnimationFrame(dAnimate);
                if(isRolling) {
                    diceMesh.rotation.x += 0.4;
                    diceMesh.rotation.y += 0.5;
                }
                dRenderer.render(dScene, dCamera);
            }
            dAnimate();
        }

        function setDiceFace(val) {
            if(!diceMesh) return;
            // Rotations to show face +z
            // faces: 0:Right(1), 1:Left(2), 2:Top(3), 3:Bottom(4), 4:Front(5), 5:Back(6)
            diceMesh.rotation.set(0,0,0);
            if(val===1) diceMesh.rotation.y = -Math.PI/2;
            if(val===2) diceMesh.rotation.y = Math.PI/2;
            if(val===3) diceMesh.rotation.x = Math.PI/2;
            if(val===4) diceMesh.rotation.x = -Math.PI/2;
            if(val===5) diceMesh.rotation.set(0,0,0);
            if(val===6) diceMesh.rotation.y = Math.PI;

            // Color dice slightly based on player
            if(gameState && dScene && dScene.children[0]) {
                const hex = gameState.players[gameState.turn].hex.replace('#','0x');
                dScene.children[0].color = new THREE.Color(parseInt(hex)); // tint ambient
            }
        }

        function positionDice() {
            const dz = document.getElementById('dice-zone');
            const turn = gameState.turn;
            const p = gameState.players[turn];

            // Update turn text
            const ti = document.getElementById('turn-indicator');
            ti.innerText = p.isAI ? p.name + ' CPU Turn' : (gameState.mode === 'pvp' ? `P${turn+1} Turn` : 'Your Turn');
            ti.style.color = p.hex;
            dz.style.borderColor = p.hex;

            // Highlight dice zone if it's a human's turn to roll
            if(gameState.state === 'ROLLING' && !p.isAI) {
                dz.style.boxShadow = `0 0 15px ${p.hex}`;
                dz.style.transform = 'scale(1.05)';
            } else {
                dz.style.boxShadow = 'none';
                dz.style.transform = 'scale(1)';
            }

            // Dynamic Dice Placement based on active HUD position
            // Positions: 0=Bottom-Left, 1=Bottom-Right, 2=Top-Right, 3=Top-Left
            // We use fixed offsets relative to the #board-container, placing the dice
            // near the respective player's corner.
            dz.style.top = 'auto'; dz.style.bottom = 'auto'; dz.style.left = 'auto'; dz.style.right = 'auto';

            const vOffset = '-75px';
            const hOffset = '80px';

            if (turn === 0) { // Bottom-Left
                dz.style.bottom = vOffset;
                dz.style.left = hOffset;
            } else if (turn === 1) { // Bottom-Right
                dz.style.bottom = vOffset;
                dz.style.right = hOffset;
            } else if (turn === 2) { // Top-Right
                dz.style.top = vOffset;
                dz.style.right = hOffset;
            } else if (turn === 3) { // Top-Left
                dz.style.top = vOffset;
                dz.style.left = hOffset;
            }

            setDiceFace(gameState.diceValue || 6);
        }

        // --- GAMEPLAY MECHANICS ---
        function rollDiceClick() {
            if(gameState.state !== 'ROLLING' || isRolling) return;
            if(gameState.players[gameState.turn].isAI) return; // Prevent clicking on AI turn
            performRoll();
        }

        function performRoll() {
            sfx.click();
            gameState.state = 'ANIMATING';
            isRolling = true;
            positionDice(); // clear highlight

            let val = Math.floor(Math.random() * 6) + 1;

            // 3D physics-based spinning decay
            let spinTime = 0;
            let duration = 800;
            let initialVelocityX = (Math.random() * 20 + 20); // rad/s
            let initialVelocityY = (Math.random() * 20 + 20);
            let initialVelocityZ = (Math.random() * 20 + 20);

            function animateRoll(t) {
                if(spinTime === 0) spinTime = t;
                let elapsed = t - spinTime;
                let progress = elapsed / duration;

                if(progress > 1) progress = 1;

                // Deceleration (ease out cubic)
                let ease = 1 - Math.pow(1 - progress, 3);

                // Spin
                diceMesh.rotation.x += initialVelocityX * (1 - ease) * 0.016;
                diceMesh.rotation.y += initialVelocityY * (1 - ease) * 0.016;
                diceMesh.rotation.z += initialVelocityZ * (1 - ease) * 0.016;

                // Parabolic Jump
                let jumpH = Math.sin(progress * Math.PI) * 40;
                let scale = 1 + Math.sin(progress * Math.PI) * 0.5;
                const dc = document.getElementById('dice-container');
                dc.style.transform = `scale(${scale}) translateY(${-jumpH}px)`;

                dRenderer.render(dScene, dCamera);

                if(progress < 1) {
                    requestAnimationFrame(animateRoll);
                } else {
                    // Settle with tiny bounce
                    dc.style.transform = `scale(1) translateY(0px)`;
                    setDiceFace(val); // Hard snap to exact face
                    dRenderer.render(dScene, dCamera);

                    isRolling = false;
                    gameState.diceValue = val;
                    if(val === 6) gameState.sixCount++;
                    else gameState.sixCount = 0;

                    setTimeout(() => processRollResult(), 300);
                }
            }
            requestAnimationFrame(animateRoll);
        }

        function processRollResult() {
            const pIdx = gameState.turn;
            const p = gameState.players[pIdx];
            const val = gameState.diceValue;

            if(gameState.sixCount === 3) {
                // 3 sixes = forfeit turn
                gameState.sixCount = 0;
                nextTurn();
                return;
            }

            // Find valid moves
            const validTokens = [];
            p.tokens.forEach((t, idx) => {
                if(t.isHome) return;
                if(t.pos === -1) {
                    if(val === 6) validTokens.push(idx);
                } else {
                    // Check if move exceeds home
                    let stepsTaken = 0;
                    if(t.pos >= 100) stepsTaken = 51 + (t.pos - 100);
                    else {
                        // Calculate steps taken on main track relative to start
                        const startPositions = [0, 39, 26, 13];
                        let startPos = startPositions[pIdx];
                        let relative = t.pos - startPos;
                        if(relative < 0) relative += 52;
                        stepsTaken = relative;
                    }

                    if(stepsTaken + val <= 56) {
                        validTokens.push(idx);
                    }
                }
            });

            if(validTokens.length === 0) {
                // No valid moves
                showToast("No Valid Move - Turn Skipped");
                setTimeout(nextTurn, 1000);
            } else if(validTokens.length === 1 && p.isAI) {
                // Auto move AI
                moveToken(validTokens[0]);
            } else if(p.isAI) {
                // AI Logic
                setTimeout(() => aiChooseMove(validTokens), 500);
            } else {
                // Wait for player input
                gameState.state = 'MOVE';
                // Add click listener to canvas for token selection
                canvas.onclick = handleTokenClick;
                canvas.onmousemove = handleTokenHover;
            }
        }

        function getClickedTokenIdx(cx, cy, x, y, pIdx) {
            const p = gameState.players[pIdx];
            // Check if hovered base tokens
            if(gameState.diceValue === 6) {
                let bx = pIdx === 0 || pIdx === 3 ? 0 : boardSize - cellSize*6;
                let currentBy = pIdx === 0 || pIdx === 1 ? boardSize - cellSize*6 : 0;
                if(x > bx && x < bx+cellSize*6 && y > currentBy && y < currentBy+cellSize*6) {
                    const baseTokenIdx = p.tokens.findIndex(t => t.pos === -1);
                    if(baseTokenIdx !== -1) return baseTokenIdx;
                }
            }

            // Check track tokens
            let hoveredIdx = -1;
            p.tokens.forEach((t, idx) => {
                if(t.pos >= 0 && t.pos < 100) {
                    const c = getCellCoords(t.pos);
                    if(c.x === cx && c.y === cy) hoveredIdx = idx;
                } else if(t.pos >= 100 && t.pos < 105) {
                    const c = getHomeCoords(pIdx, t.pos - 100);
                    if(c.x === cx && c.y === cy) hoveredIdx = idx;
                }
            });
            return hoveredIdx;
        }

        function handleTokenHover(e) {
            if(gameState.state !== 'MOVE') { canvas.style.cursor = 'default'; return; }
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const cx = Math.floor(x / cellSize);
            const cy = Math.floor(y / cellSize);

            const hoveredIdx = getClickedTokenIdx(cx, cy, x, y, gameState.turn);
            if(hoveredIdx !== -1) canvas.style.cursor = 'pointer';
            else canvas.style.cursor = 'default';
        }

        function handleTokenClick(e) {
            if(gameState.state !== 'MOVE') return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const cx = Math.floor(x / cellSize);
            const cy = Math.floor(y / cellSize);

            const clickedIdx = getClickedTokenIdx(cx, cy, x, y, gameState.turn);
            if(clickedIdx !== -1) moveToken(clickedIdx);
        }

        let animatingToken = null;

        function moveToken(tIdx) {
            canvas.onclick = null; // remove listener
            canvas.onmousemove = null;
            canvas.style.cursor = 'default';
            gameState.state = 'ANIMATING';

            const pIdx = gameState.turn;
            const p = gameState.players[pIdx];
            const t = p.tokens[tIdx];
            const val = gameState.diceValue;

            let extraChance = false;

            if(t.pos === -1 && val === 6) {
                // Move out of base
                const startPositions = [0, 39, 26, 13];
                const startPos = startPositions[pIdx];

                // Set up animation
                let baseCoords;
                let currentBy = pIdx === 0 || pIdx === 1 ? boardSize - cellSize*6 : 0;
                let bx = pIdx === 0 || pIdx === 3 ? 0 : boardSize - cellSize*6;
                // find which token index it is in base
                const bIdx = p.tokens.filter(tk => tk.pos === -1).indexOf(t);
                const posArr = [
                    {x: bx + cellSize*1.5, y: currentBy + cellSize*1.5},
                    {x: bx + cellSize*4.5, y: currentBy + cellSize*1.5},
                    {x: bx + cellSize*1.5, y: currentBy + cellSize*4.5},
                    {x: bx + cellSize*4.5, y: currentBy + cellSize*4.5}
                ];
                let sx = posArr[tIdx].x; // We use tIdx to distribute base tokens correctly
                let sy = posArr[tIdx].y;
                let startCoords = {x: sx, y: sy};

                let targetCellCoords = getCellCoords(startPos);
                let targetCoords = {x: targetCellCoords.x * cellSize + cellSize/2, y: targetCellCoords.y * cellSize + cellSize/2};

                sfx.move();
                animateHop(t, startCoords, targetCoords, () => {
                    t.pos = startPos;
                    extraChance = true; // 6 gives extra chance
                    finishMove(extraChance);
                });
            } else {
                // Animate step by step
                let stepsLeft = val;

                function step() {
                    if (stepsLeft === 0) {
                        if(t.pos === 105) {
                            t.isHome = true;
                            t.pos = 999;
                            p.finishedCount++;
                            extraChance = true; // Reach home = extra chance
                            sfx.home();
                            createHomePop(pIdx);

                            // Check win
                            if(p.finishedCount === 4) {
                                handleWin(pIdx);
                                return;
                            }
                            if(val === 6) extraChance = true;
                            finishMove(extraChance);
                            return;
                        } else {
                            // Check cut
                            const cutHappened = checkCut(pIdx, t.pos, () => {
                                if(val === 6) extraChance = true;
                                finishMove(extraChance);
                            });

                            if (cutHappened) {
                                extraChance = true;
                                return; // finishMove will be called by the cut callback
                            }
                        }

                        if(val === 6) extraChance = true;
                        finishMove(extraChance);
                        return;
                    }

                    stepsLeft--;
                    let nextPos = t.pos;
                    if(t.pos >= 100) {
                        nextPos = t.pos + 1;
                    } else {
                        // Check if entering home stretch
                        const startPositions = [0, 39, 26, 13];
                        let startPos = startPositions[pIdx];
                        let relative = t.pos - startPos;
                        if(relative < 0) relative += 52;

                        if(relative === 50) {
                            nextPos = 100; // Enter home stretch
                        } else {
                            nextPos = (t.pos + 1) % 52;
                        }
                    }

                    let startC, targetC;
                    if (t.pos >= 100) {
                        let h1 = getHomeCoords(pIdx, t.pos - 100);
                        startC = {x: h1.x * cellSize + cellSize/2, y: h1.y * cellSize + cellSize/2};
                    } else if (t.pos >= 0) {
                        let c1 = getCellCoords(t.pos);
                        startC = {x: c1.x * cellSize + cellSize/2, y: c1.y * cellSize + cellSize/2};
                    }

                    if (nextPos >= 100) {
                        let h2 = getHomeCoords(pIdx, nextPos - 100);
                        targetC = {x: h2.x * cellSize + cellSize/2, y: h2.y * cellSize + cellSize/2};
                    } else {
                        let c2 = getCellCoords(nextPos);
                        targetC = {x: c2.x * cellSize + cellSize/2, y: c2.y * cellSize + cellSize/2};
                    }

                    sfx.move();
                    animateHop(t, startC, targetC, () => {
                        t.pos = nextPos;
                        step();
                    });
                }

                step();
            }
        }

        function animateHop(token, startCoords, targetCoords, callback) {
            animatingToken = token;
            let startTime = null;
            const duration = 200; // ms per hop

            function anim(time) {
                if (!startTime) startTime = time;
                let progress = (time - startTime) / duration;
                if (progress > 1) progress = 1;

                // Bezier curve interpolation
                let currX = startCoords.x + (targetCoords.x - startCoords.x) * progress;
                let currY = startCoords.y + (targetCoords.y - startCoords.y) * progress;

                // Parabolic arc for hop (y offset)
                let arcHeight = cellSize * 0.8;
                let hopY = -Math.sin(progress * Math.PI) * arcHeight;

                token.animX = currX;
                token.animY = currY + hopY;
                token.shadowScale = 1 - Math.sin(progress * Math.PI) * 0.5;

                drawBoard();

                if (progress < 1) {
                    requestAnimationFrame(anim);
                } else {
                    animatingToken = null;
                    token.animX = null;
                    token.animY = null;
                    token.shadowScale = null;
                    callback();
                }
            }
            requestAnimationFrame(anim);
        }

        function checkCut(myIdx, pos, onComplete) {
            if(pos >= 100) return false;
            if(safeZones.includes(pos)) return false; // Cannot cut on star

            let cut = false;
            let cutToken = null;
            let cutPlayer = null;

            gameState.players.forEach((p, pIdx) => {
                if(pIdx === myIdx || !p.active) return;
                p.tokens.forEach(t => {
                    if(t.pos === pos) {
                        cut = true;
                        cutToken = t;
                        cutPlayer = p;
                    }
                });
            });

            if (cut) {
                sfx.cut();
                gameState.state = 'ANIMATING'; // Lock state

                // Get start coords (current pos)
                let startCellCoords = getCellCoords(pos);
                let startCoords = {x: startCellCoords.x * cellSize + cellSize/2, y: startCellCoords.y * cellSize + cellSize/2};

                // Get target coords (base pos)
                const pIdx = gameState.players.indexOf(cutPlayer);
                let bx = pIdx === 0 || pIdx === 3 ? 0 : boardSize - cellSize*6;
                let currentBy = pIdx === 0 || pIdx === 1 ? boardSize - cellSize*6 : 0;

                // find which token index it is in base
                const bIdx = cutPlayer.tokens.indexOf(cutToken);
                const posArr = [
                    {x: bx + cellSize*1.5, y: currentBy + cellSize*1.5},
                    {x: bx + cellSize*4.5, y: currentBy + cellSize*1.5},
                    {x: bx + cellSize*1.5, y: currentBy + cellSize*4.5},
                    {x: bx + cellSize*4.5, y: currentBy + cellSize*4.5}
                ];
                let targetCoords = {x: posArr[bIdx].x, y: posArr[bIdx].y};

                // Animate token flying back
                animatingToken = cutToken;
                let startTime = null;
                const duration = 600; // ms for flight back

                function anim(time) {
                    if (!startTime) startTime = time;
                    let progress = (time - startTime) / duration;
                    if (progress > 1) progress = 1;

                    // Ease in out
                    let ease = progress < 0.5 ? 2 * progress * progress : -1 + (4 - 2 * progress) * progress;

                    let currX = startCoords.x + (targetCoords.x - startCoords.x) * ease;
                    let currY = startCoords.y + (targetCoords.y - startCoords.y) * ease;

                    // High parabolic arc
                    let arcHeight = cellSize * 2.5;
                    let hopY = -Math.sin(ease * Math.PI) * arcHeight;

                    cutToken.animX = currX;
                    cutToken.animY = currY + hopY;
                    cutToken.shadowScale = 1 - Math.sin(ease * Math.PI) * 0.8;

                    drawBoard();

                    if (progress < 1) {
                        requestAnimationFrame(anim);
                    } else {
                        animatingToken = null;
                        cutToken.animX = null;
                        cutToken.animY = null;
                        cutToken.shadowScale = null;
                        cutToken.pos = -1; // Officially reset
                        addGameParticles(targetCoords.x, targetCoords.y, cutPlayer.hex, 'smash');
                        if (onComplete) onComplete();
                    }
                }
                requestAnimationFrame(anim);
            }

            return cut;
        }

        function createHomePop(pIdx) {
            let cx = boardSize / 2;
            let cy = boardSize / 2;
            addGameParticles(cx, cy, gameState.players[pIdx].hex, 'pop');
        }

        function finishMove(extraChance) {
            drawBoard();
            saveGame();
            if(extraChance) {
                gameState.state = 'ROLLING';
                updateTurnUI();
                if(gameState.players[gameState.turn].isAI) setTimeout(performRoll, 800);
            } else {
                nextTurn();
            }
        }

        function nextTurn() {
            gameState.sixCount = 0;
            do {
                gameState.turn = (gameState.turn + 1) % 4;
            } while(!gameState.players[gameState.turn].active || gameState.players[gameState.turn].finishedCount === 4);

            gameState.state = 'ROLLING';
            updateTurnUI();
            saveGame();

            if(gameState.players[gameState.turn].isAI) {
                setTimeout(performRoll, 1000);
            }
        }

        function handleWin(pIdx) {
            clearSave();
            gameState.state = 'GAMEOVER';
            document.getElementById('game-over-screen').classList.remove('hidden');
            const name = gameState.players[pIdx].isAI ? 'CPU' : (gameState.mode === 'pvp' ? `PLAYER ${pIdx+1}` : 'YOU');
            document.getElementById('go-title').innerText = `${name} WINS!`;
            document.getElementById('go-title').style.color = gameState.players[pIdx].hex;

            sfx.win();
            initFireworks();
        }

        // --- AI LOGIC ---
        function doAITurn() {
            if(gameState.state !== 'ROLLING') return;
            performRoll();
        }

        function aiChooseMove(validTokens) {
            const pIdx = gameState.turn;
            const p = gameState.players[pIdx];
            const val = gameState.diceValue;

            if(gameConfig.difficulty === 'normal') {
                moveToken(validTokens[Math.floor(Math.random() * validTokens.length)]);
                return;
            }

            // Advanced Logic with Threat Detection
            let bestScore = -999;
            let bestToken = validTokens[0];

            validTokens.forEach(idx => {
                let score = 0;
                const t = p.tokens[idx];

                // Helper to check if a position is in danger from any enemy
                function isInDanger(pos) {
                    if (pos === -1 || pos >= 100 || safeZones.includes(pos)) return false;
                    let danger = false;
                    gameState.players.forEach((op, oIdx) => {
                        if (oIdx !== pIdx && op.active) {
                            op.tokens.forEach(ot => {
                                if (ot.pos >= 0 && ot.pos < 100) {
                                    let dist = pos - ot.pos;
                                    if (dist < 0) dist += 52;
                                    // If enemy is 1 to 6 spaces behind, we are in danger
                                    if (dist > 0 && dist <= 6) {
                                        danger = true;
                                    }
                                }
                            });
                        }
                    });
                    return danger;
                }

                if(t.pos === -1) {
                    score += 50; // Getting a token out is good
                } else {
                    let targetPos;
                    const startPositions = [0, 39, 26, 13];
                    if(t.pos >= 100) {
                        targetPos = t.pos + val;
                    } else {
                        let relative = t.pos - startPositions[pIdx];
                        if(relative < 0) relative += 52;
                        if(relative + val > 50) targetPos = 100 + (relative + val - 51);
                        else targetPos = (t.pos + val) % 52;
                    }

                    // Priority 3: Entering home / Winning
                    if (targetPos >= 100) {
                        score += 300;
                        if (targetPos === 105) score += 500; // Winning is best
                    }

                    // Priority 2: Cutting an enemy
                    if(targetPos < 100 && !safeZones.includes(targetPos)) {
                        gameState.players.forEach((op, oIdx) => {
                            if(oIdx !== pIdx && op.active) {
                                op.tokens.forEach(ot => {
                                    if(ot.pos === targetPos) score += 400; // Cutting is very high priority
                                });
                            }
                        });
                    }

                    // Priority 1: Escaping Danger
                    let currentlyInDanger = isInDanger(t.pos);
                    let targetInDanger = isInDanger(targetPos);

                    if (currentlyInDanger) {
                        if (!targetInDanger || targetPos >= 100 || safeZones.includes(targetPos)) {
                            score += 600; // Moving out of danger is the absolute highest priority (if not cutting/winning)
                        } else {
                            score += 200; // Moving but still in danger is better than staying, but less ideal
                        }
                    }

                    // Moving to a safe zone (if not already escaping danger)
                    if (targetPos < 100 && safeZones.includes(targetPos) && !currentlyInDanger) {
                        score += 150;
                    }

                    // Priority 4: Basic forward movement
                    // Closer to home gets slightly more points to encourage progress
                    if (t.pos >= 0 && t.pos < 100) {
                         let relative = t.pos - startPositions[pIdx];
                         if(relative < 0) relative += 52;
                         score += relative; // 0 to 50
                    }
                }

                if(score > bestScore) {
                    bestScore = score;
                    bestToken = idx;
                }
            });

            moveToken(bestToken);
        }

        // --- PARTICLES & FIREWORKS ---
        const gameParticles = [];

        function addGameParticles(x, y, color, type='pop') {
            let count = type === 'smash' ? 30 : 20;
            let speed = type === 'smash' ? 8 : 4;

            for(let i=0; i<count; i++) {
                gameParticles.push({
                    x, y,
                    vx: (Math.random()-0.5)*speed,
                    vy: (Math.random()-0.5)*speed - (type==='smash'?2:0),
                    life: 1.0,
                    color: color,
                    decay: type === 'smash' ? 0.05 : 0.03
                });
            }
            if(!particleAnimId) particleAnimLoop();
        }

        let particleAnimId = null;
        function particleAnimLoop() {
            if(gameParticles.length === 0) {
                particleAnimId = null;
                drawBoard(); // clean up last frame
                return;
            }

            drawBoard(); // redraw board under particles

            ctx.save();
            for(let i=gameParticles.length-1; i>=0; i--) {
                const p = gameParticles[i];
                p.x += p.vx; p.y += p.vy;
                p.vy += 0.1; // mild gravity
                p.life -= p.decay;

                if(p.life <= 0) { gameParticles.splice(i, 1); continue; }

                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.restore();

            particleAnimId = requestAnimationFrame(particleAnimLoop);
        }

        function initFireworks() {
            const canvas = document.getElementById('fireworks-canvas');
            const fwCtx = canvas.getContext('2d');

            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + "px";
            canvas.style.height = window.innerHeight + "px";
            fwCtx.scale(dpr, dpr);

            const particles = [];
            const colors = ['#e74c3c', '#2ecc71', '#f1c40f', '#3498db', '#9b59b6', '#00f3ff'];

            function createExplosion(x, y) {
                const c = colors[Math.floor(Math.random() * colors.length)];
                for(let i=0; i<50; i++) {
                    particles.push({
                        x, y,
                        vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
                        life: 1.0, color: c
                    });
                }
            }

            setInterval(() => {
                if(Math.random() < 0.3 && gameState.state === 'GAMEOVER') {
                    createExplosion(Math.random()*window.innerWidth, Math.random()*window.innerHeight/2);
                }
            }, 500);

            function drawFw() {
                if(gameState.state !== 'GAMEOVER') return;
                requestAnimationFrame(drawFw);
                fwCtx.clearRect(0,0,window.innerWidth,window.innerHeight);

                for(let i=particles.length-1; i>=0; i--) {
                    const p = particles[i];
                    p.x += p.vx; p.y += p.vy; p.vy += 0.2; // gravity
                    p.life -= 0.02;
                    if(p.life <= 0) { particles.splice(i, 1); continue; }

                    fwCtx.globalAlpha = p.life;
                    fwCtx.fillStyle = p.color;
                    fwCtx.beginPath(); fwCtx.arc(p.x, p.y, 3, 0, Math.PI*2); fwCtx.fill();
                }
                fwCtx.globalAlpha = 1.0;
            }
            drawFw();
        }

    </script>
